<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>漢字書き順ゲーム</title>
  
  <!-- スマホ・PWA対応 (ホーム画面に追加したときにアプリっぽくする) -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="漢字ゲーム">
  <meta name="theme-color" content="#fce4ec">
  
  <!-- ポップで可愛いフォント -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
  
  <!-- Hanzi Writer ライブラリ -->
  <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
  <!-- confetti (紙吹雪) ライブラリ -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app" class="app-container">
    <header class="header">
      <h1>🍄 かん字かきじゅんゲーム 🍄</h1>
      <button id="sound-toggle" class="sound-btn" title="音のON/OFF">🔊</button>
    </header>

    <main class="main-content">
      <!-- 学年選択画面 -->
      <section id="level-selection" class="screen active">
        <h2 style="margin-bottom: 20px;">どのレベルにちょうせんする？</h2>
        
        <p class="section-title">🎒 小学生レベル</p>
        <div class="level-grid" id="level-grid-elementary">
          <button class="level-btn btn-primary" data-grade="1">小学1年生<div class="high-score" id="score-grade-1"></div></button>
          <button class="level-btn btn-secondary" data-grade="2">小学2年生<div class="high-score" id="score-grade-2"></div></button>
          <button class="level-btn btn-tertiary" data-grade="3">小学3年生<div class="high-score" id="score-grade-3"></div></button>
          <button class="level-btn btn-quaternary" data-grade="4">小学4年生<div class="high-score" id="score-grade-4"></div></button>
          <button class="level-btn btn-quinary" data-grade="5">小学5年生<div class="high-score" id="score-grade-5"></div></button>
          <button class="level-btn btn-senary" data-grade="6">小学6年生<div class="high-score" id="score-grade-6"></div></button>
        </div>

        <p class="section-title" style="margin-top: 30px;">🏫 中学生レベル</p>
        <div class="level-grid" id="level-grid-junior-high">
          <button class="level-btn btn-jh1" data-grade="jh1">中学1年生<div class="high-score" id="score-grade-jh1"></div></button>
          <button class="level-btn btn-jh2" data-grade="jh2">中学2年生<div class="high-score" id="score-grade-jh2"></div></button>
          <button class="level-btn btn-jh3" data-grade="jh3">中学3年生<div class="high-score" id="score-grade-jh3"></div></button>
        </div>
      </section>

      <!-- ゲーム画面 -->
      <section id="game-screen" class="screen">
        <div class="game-header">
          <button id="back-btn" class="nav-btn">◀ もどる</button>
          <h2 id="current-grade-title">1年生の漢字</h2>
          <div class="score-display">せいかい: <span id="score-counter">0</span> / <span id="total-counter">0</span></div>
        </div>
        
        <div class="kanji-container">
          <div id="loading-spinner" class="hidden">よみこみ中...</div>
          <div id="kanji-target"></div>
        </div>

        <div class="game-controls">
          <button id="hint-btn" class="action-btn hint-btn">💡 ヒント</button>
          <button id="skip-btn" class="action-btn reset-btn">⏭ スキップ</button>
        </div>

        <div id="feedback-message" class="feedback-message hidden">
          すごーい！大正解！🎉
        </div>
        
        <div id="result-controls" class="hidden" style="margin-top: 20px;">
          <div id="mistake-container" class="hidden" style="margin-bottom: 15px;">
            <p style="color: #5d4037; font-weight: bold;">まちがえた漢字リスト:</p>
            <div id="mistake-list" style="font-size: 1.5rem; letter-spacing: 10px; margin-bottom: 15px;"></div>
            <button id="review-btn" class="action-btn hint-btn">まちがえた漢字を復習する</button>
          </div>
          <button id="restart-btn" class="action-btn btn-primary">最初からもういちど遊ぶ</button>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
